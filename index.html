<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Developer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="bento-container">
        <!-- Profile Card -->
        <section class="bento-box profile-card">
            <img id="avatar" src="" alt="Profile Picture" class="avatar">
            <h1 id="name">Loading...</h1>
            <p id="title" class="subtitle"></p>
            <p id="bio"></p>
            <div id="socials" class="social-links"></div>
        </section>

        <!-- Skills Card -->
        <section class="bento-box skills-card">
            <h2>Technical Stack</h2>
            <div id="skills-grid" class="skills-grid"></div>
        </section>

        <!-- Projects Section -->
        <section class="bento-box projects-card">
            <h2>Featured Deployments</h2>
            <div id="projects-grid" class="projects-grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
